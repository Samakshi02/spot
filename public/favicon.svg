<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#f5ecd7"/>
  <g stroke="#1a1f2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Eyepiece -->
    <rect x="26" y="8" width="12" height="6" rx="1.5" fill="#b8893a"/>
    <!-- Upper tube -->
    <rect x="28" y="14" width="8" height="10" fill="#1a1f2e"/>
